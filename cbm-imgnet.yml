apiVersion: v1
kind: Pod
metadata:
  name: cb-imgnet-debug
  namespace: longweiwangusd
spec:
  containers:
  - name: jupyter-container
    image: continuumio/anaconda3:latest
    command: ["sleep", "infinity"]
    volumeMounts:
    - name: data-storage
      mountPath: /data
    - name: dshm
      mountPath: /dev/shm
    resources:
      requests:
        memory: "16Gi"
        cpu: "4"
        nvidia.com/gpu: 1
      limits:
        memory: "32Gi"
        cpu: "8"
        nvidia.com/gpu: 1
  volumes:
  - name: data-storage
    persistentVolumeClaim:
      claimName: imagenet-pvc
  - name: dshm
    emptyDir:
      medium: Memory
      sizeLimit: "8Gi"
  restartPolicy: Never